services:
  frontend:
    image: simpleyyt/manus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - manus-network
    environment:
      - BACKEND_URL=http://backend:8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - gateway
      - sandbox
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - manus-network
    environment:
      - GATEWAY_BASE_URL=http://gateway:8100
      - GATEWAY_API_KEY=change-me-please
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_INTERNAL_API_KEY=change-me-please
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=manus
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - AUTH_PROVIDER=password
      - PASSWORD_SALT=
      - PASSWORD_HASH_ROUNDS=10
      - JWT_SECRET_KEY=your-secret-key-here
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - LOG_LEVEL=INFO

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8100"]
    restart: unless-stopped
    networks:
      - manus-network
    environment:
      - GATEWAY_INTERNAL_API_KEY=change-me-please
      - GATEWAY_TOKEN_ISSUER_SECRET=change-me
      - GATEWAY_JWT_ALGORITHM=HS256
      - GATEWAY_TOKEN_TTL_SECONDS=1800
      - API_BASE=https://api.openai.com/v1
      - API_KEY=sk-xxxx
      - MODEL_NAME=gpt-4o-mini
      - MODEL_PROVIDER=openai
      - TEMPERATURE=0.7
      - MAX_TOKENS=2000
      - GATEWAY_TIMEOUT_SECONDS=120

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    ports:
      - "9222:9222"
      - "5901:5901"
      - "8080:8080"
    restart: unless-stopped
    networks:
      - manus-network
    environment:
      - SANDBOX_INTERNAL_API_KEY=change-me-please
      - LOG_LEVEL=INFO
      - SEARCH_PROVIDER=duckduckgo
      - MCP_CONFIG_PATH=/etc/mcp.json
      - MODEL_NAME=gpt-4o-mini
      - MODEL_PROVIDER=openai
      - TEMPERATURE=0.7
      - MAX_TOKENS=2000
      - AGENT_MODEL_MAX_ITERATIONS=100
      - AGENT_MODEL_MAX_RETRIES=3
      - AGENT_MODEL_RETRY_INTERVAL_SECONDS=1.0
      - AGENT_LOOP_MAX_ROUNDS=40
      - AGENT_LOOP_TIMEOUT_SECONDS=1800

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - manus-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - manus-network

volumes:
  mongodb_data:
    name: manus-mongodb-data

networks:
  manus-network:
    name: manus-network
    driver: bridge
